<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samurai Store - Armory</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* تنسيقات المتجر الأساسية لضمان عمل الألوان مع الرئيسية */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .game-item { border: 4px solid #fff; padding: 25px; text-align: center; background: #111; transition: 0.3s; }
        .game-item:hover { border-color: #e63946; transform: translateY(-10px); }
        
        /* سلة المشتريات */
        .cart-panel { background: rgba(0, 0, 0, 0.9); border: 6px solid #e63946; padding: 20px; margin-top: 50px; color: #fff; }
        #cart-items { list-style: none; padding: 0; }
        #cart-items li { border-bottom: 1px dashed #444; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; font-size: 10px; }
        .price-tag { background: #e63946; color: #fff; padding: 5px; font-size: 10px; display: inline-block; margin: 10px 0; }
        
        /* دعم الوضع النهاري (Light Mode) المتوافق مع الرئيسية */
        body.light-mode .pixel-main-card { background-color: #f4ece1; border-color: #8b4513; color: #432b18; }
        body.light-mode .game-item { background: #fdf8f0; border-color: #8b4513; color: #432b18; }
        body.light-mode .cart-panel { background: #fdf8f0; border-color: #8b4513; color: #432b18; }
        body.light-mode .price-tag { background: #800000; }
        body.light-mode .navbar { background: #e9decb; border-bottom: 4px solid #8b4513; }
        
        #petals-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        body.rtl { direction: rtl; }
        /* كلاس البداية (تكون الصفحة مخفية) */
.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
}

/* كلاس الدخول (تظهر الصفحة تدريجياً) */
body {
    opacity: 1;
    transition: opacity 0.5s ease;
}

body.loading {
    opacity: 0;
}
#snackbar-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10001;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.snackbar {
    background: #1a1a1a;
    color: #fff;
    border: 2px solid #e63946;
    padding: 12px 20px;
    font-size: 10px; /* ليتناسب مع خط البكسل */
    font-family: 'Press Start 2P', cursive;
    box-shadow: 5px 5px 0px #000;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    min-width: 250px;
}

/* حالة النجاح (مثلاً عند الشراء) */
.snackbar.success { border-color: #28a745; }
/* حالة التنبيه (مثلاً عند انتهاء اللعبة) */
.snackbar.info { border-color: #f1c40f; }

@keyframes slideUp {
    from { opacity: 0; transform: translateY(100px); }
    to { opacity: 1; transform: translateY(0); }
}

.snackbar.fade-out {
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.4s ease;
}

body.rtl .snackbar { direction: rtl; }
    </style>
</head>
<body>
    <div class="samurai-doors">
        <div class="door-left"></div>
        <div class="door-right"></div>
    </div>
    <div id="petals-container"></div>
    <audio id="storeMusic" loop><source src="assets/zen-music.mp3" type="audio/mpeg"></audio>
    <audio id="slash-sound"><source src="assets/katana-slash.mp3" type="audio/mpeg"></audio>

    <nav class="navbar">
        <div class="logo">SAMURAI<span>STORE</span></div>
        <div class="nav-controls">
            <button id="music-btn-store" class="control-btn">MUSIC: <span id="music-status-store">OFF</span></button>
            <a href="index.html" class="control-btn" data-en="BACK" data-ar="رجوع" style="text-decoration:none;">BACK</a>
        </div>
    </nav>

    <main class="main-card-section">
        <div class="pixel-main-card">
            <h1 data-en="GAME ARMORY" data-ar="مخزن الألعاب">GAME ARMORY</h1>
            
            <div class="store-grid">
                <div class="game-item">
                    <div style="font-size: 40px;">🎮</div>
                    <h3 data-en="SHOGUN REVENGE" data-ar="انتقام الشوغن">SHOGUN REVENGE</h3>
                    <div class="price-tag">$19.99</div>
                    <button class="mini-pixel-btn" onclick="addToCart('Shogun Revenge', 19.99)" data-en="ADD TO CART" data-ar="أضف للسلة">ADD TO CART</button>
                </div>
                <div class="game-item">
                    <div style="font-size: 40px;">🐉</div>
                    <h3 data-en="DRAGON SOUL" data-ar="روح التنين">DRAGON SOUL</h3>
                    <div class="price-tag">$25.00</div>
                    <button class="mini-pixel-btn" onclick="addToCart('Dragon Soul', 25.00)" data-en="ADD TO CART" data-ar="أضف للسلة">ADD TO CART</button>
                </div>
            </div>

            <div class="cart-panel">
                <h4 data-en="YOUR CART" data-ar="سلة مشترياتك">YOUR CART</h4>
                <ul id="cart-items"></ul>
                <div style="margin-top:20px; border-top: 2px solid #e63946; padding-top:10px;">
                    <p><span data-en="Total:" data-ar="المجموع:">Total:</span> $<span id="cart-total">0.00</span></p>
                </div>
                <button class="mini-pixel-btn" onclick="checkout()" data-en="PURCHASE" data-ar="إتمام الشراء" style="width:100%; padding:15px; margin-top:15px;">PURCHASE</button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('storeMusic');
            const musicBtn = document.getElementById('music-btn-store');
            const musicStatus = document.getElementById('music-status-store');
            const slashSound = document.getElementById('slash-sound');

            // --- 1. وظيفة المزامنة مع الرئيسية (باستخدام مفاتيحك الخاصة) ---
            function syncSettings() {
                const lang = localStorage.getItem('samurai_lang') || 'en';
                const theme = localStorage.getItem('samurai_theme') || 'dark';
                const musicSetting = localStorage.getItem('samurai_music_on');

                // تطبيق اللغة
                const isAr = (lang === 'ar');
                document.body.classList.toggle('rtl', isAr);
                document.querySelectorAll('[data-en]').forEach(el => {
                    el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
                });

                // تطبيق الثيم (ليلي/نهاري)
                const isLight = (theme === 'light');
                document.body.classList.toggle('light-mode', isLight);

                // تطبيق الموسيقى
                if (musicSetting === 'true') {
                    audio.play().catch(() => {
                        // الانتظار لأول تفاعل إذا منع المتصفح التشغيل
                        window.addEventListener('click', () => {
                            if(localStorage.getItem('samurai_music_on') === 'true') audio.play();
                        }, {once: true});
                    });
                    musicStatus.innerText = "ON";
                } else {
                    audio.pause();
                    musicStatus.innerText = "OFF";
                }
            }

            // تنفيذ المزامنة عند الفتح
            syncSettings();

            // الاستماع للتغييرات في Tab آخر (إذا غير المستخدم الإعدادات في الرئيسية والتبويبين مفتوحين)
            window.addEventListener('storage', syncSettings);

            // زر التحكم بالموسيقى داخل المتجر (يحدث الرئيسية أيضاً)
            if (musicBtn) {
                musicBtn.onclick = () => {
                    if (audio.paused) {
                        audio.play();
                        musicStatus.innerText = "ON";
                        localStorage.setItem('samurai_music_on', 'true');
                    } else {
                        audio.pause();
                        musicStatus.innerText = "OFF";
                        localStorage.setItem('samurai_music_on', 'false');
                    }
                };
            }

            // تأثير ضربة السيف (من كودك الأصلي)
            document.addEventListener('mousedown', (e) => {
                if (slashSound) {
                    slashSound.currentTime = 0;
                    slashSound.play().catch(() => {});
                }
                const slash = document.createElement('div');
                slash.className = 'slash-effect'; // تأكد أن التنسيق موجود في style.css
                slash.style.left = e.clientX + 'px';
                slash.style.top = e.clientY + 'px';
                document.body.appendChild(slash);
                setTimeout(() => slash.remove(), 250);
            });

            // --- تأثير البتلات ---
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 3 + 5) + 's';
                document.getElementById('petals-container').appendChild(petal);
                setTimeout(() => petal.remove(), 8000);
            }, 400);
        });

        // --- نظام السلة ---
        let cart = [];
        function addToCart(name, price) {
    cart.push({ name, price });
    updateCart();
    
    // استدعاء السناك بار هنا
    const isAr = localStorage.getItem('samurai_lang') === 'ar';
    showSamuraiToast(isAr ? "تمت الإضافة للسلة" : "Added to Cart", "success");
}
        function updateCart() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item) => {
                total += item.price;
                list.innerHTML += `<li>${item.name} <span>$${item.price}</span></li>`;
            });
            totalEl.innerText = total.toFixed(2);
        }

        function checkout() {
    const isAr = localStorage.getItem('samurai_lang') === 'ar';
    
    if(cart.length === 0) {
        showSamuraiToast(isAr ? "السلة فارغة!" : "Cart is empty!", "info");
        return;
    }
    
    // نجاح الشراء
    showSamuraiToast(isAr ? "تم الشراء بنجاح!" : "Purchase Successful!", "success");
    cart = [];
    updateCart();
}
        document.addEventListener('DOMContentLoaded', () => {
    const doors = document.querySelector('.samurai-doors');

    // 1. عند الدخول: افتح الأبواب بعد تأخير بسيط
    setTimeout(() => {
        if (doors) doors.classList.add('open');
    }, 100);

    // 2. عند الضغط على الروابط: أغلق الأبواب ثم انتقل
    const navLinks = document.querySelectorAll('a');
    
    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            // نتحقق أن الرابط داخلي (في نفس الموقع)
            if (link.hostname === window.location.hostname && !link.hash && link.target !== "_blank") {
                e.preventDefault();
                const targetUrl = link.href;

                // إغلاق الأبواب
                doors.classList.remove('open');
                doors.classList.add('close');

                // الانتقال بعد انتهاء الأنيميشن (0.6 ثانية)
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 600);
            }
        });
    });
});
function showSamuraiToast(message, type = 'default') {
    const container = document.getElementById('snackbar-container');
    if (!container) return;

    // إنشاء عنصر الإشعار
    const toast = document.createElement('div');
    toast.className = `snackbar ${type}`;
    
    // إضافة أيقونة بسيطة حسب النوع
    let icon = '⚔️';
    if (type === 'success') icon = '✅';
    if (type === 'info') icon = '🎮';

    toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;

    // إضافة الإشعار للحاوية
    container.appendChild(toast);

    // إزالة الإشعار بعد 3 ثوانٍ
    setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 400);
    }, 3000);
}
    </script>
    <div id="snackbar-container"></div>
</body>
</html>
